<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak Wishes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card-container" id="eidCard">
        <div class="card">
            <div class="card-front">
                <div class="moon-star">🌙✨</div>
                <h1>Eid Mubarak</h1>
                <p class="tap-instruction">Click to Open the Card</p>
                <div class="animal-emojis">🐐 🐂 🐪</div>
            </div>
            
            <div class="card-back">
                <div class="confetti">
                    <span>🎉</span>
                    <span>🎉</span>
                </div>
                <div class="celebration-icon">✨🎉✨</div>
                <h2 class="main-wishes">Eid ul Adha Mubarak</h2>
                <p class="message">May the divine blessings of Allah bring you hope, faith, and joy on this auspicious occasion of Eid ul Adha.</p>
                <div class="divider">━━━━━━━━━</div>
                <p class="sender-tag">With Best Wishes From:</p>
                <h3 class="sender-name">Hafiz Asad Ullah Khan</h3>
            </div>
        </div>
    </div>

    <audio id="eidAudio" src="eid-song.mp3" preload="auto" loop></audio>
    <script src="script.js"></script>
</body>
</html>
